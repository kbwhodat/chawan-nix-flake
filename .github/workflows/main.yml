name: Check and build packages

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-linux:
    name: Build for x86_64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: chawan-nix-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix flake check
      - name: Build package
        run: nix build .#packages.x86_64-linux.default --print-out-paths
      - name: Push to Cachix
        run: |
          nix-store --query --requisites --include-outputs $(nix path-info .#packages.x86_64-linux.default) | cachix push chawan-nix-flake

  build-macos-arm:
    name: Build for aarch64-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: chawan-nix-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build package
        run: nix build .#packages.aarch64-darwin.default --print-out-paths
      - name: Push to Cachix
        run: |
          nix-store --query --requisites --include-outputs $(nix path-info .#packages.aarch64-darwin.default) | cachix push chawan-nix-flake

  build-macos-intel:
    name: Build for x86_64-darwin
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v3.12.2
      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: chawan-nix-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build package
        run: nix build .#packages.x86_64-darwin.default --print-out-paths
      - name: Push to Cachix
        run: |
          nix-store --query --requisites --include-outputs $(nix path-info .#packages.x86_64-darwin.default) | cachix push chawan-nix-flake
