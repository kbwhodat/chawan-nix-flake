name: Check and build packages

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-linux:
    name: Build for x86_64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: chawan-nix-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix flake check
      - name: Build and push to Cachix
        run: |
          cachix watch-exec chawan-nix-flake -- \
            nix build .#packages.x86_64-linux.default --print-out-paths

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: chawan-nix-flake
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build and push to Cachix
        run: |
          cachix watch-exec chawan-nix-flake -- \
            nix build .#packages.aarch64-darwin.default --print-out-paths
      - run: nix eval .#packages.x86_64-darwin.default.name
